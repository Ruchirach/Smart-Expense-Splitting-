spring.application.name=smart-expense-splitter

# H2 in-memory database configuration
spring.datasource.url=jdbc:h2:mem:expensesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console for debugging (open at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow CORS errors to be visible easily in dev
server.error.include-message=always

# JWT configuration (base64-encoded 256-bit secret)
app.jwt.secret=U21hcnRFeHBlbnNlU3BsaXR0ZXJTZWNyZXRLZXlGb3JEZW1vT25seTEyMzQ1Njc4OTA=
app.jwt.expiration-ms=86400000

